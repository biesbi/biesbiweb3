    (function () {
      if (window.__boomerPerf) {
        return;
      }

      function debounce(fn, wait) {
        var timer = null;
        return function () {
          var context = this;
          var args = arguments;
          clearTimeout(timer);
          timer = setTimeout(function () {
            fn.apply(context, args);
          }, wait || 120);
        };
      }

      function startObserver(targetResolver, callback, options) {
        options = options || {};
        var observer = null;
        var stopTimer = null;
        var pollTimer = null;
        var started = false;
        var run = debounce(function () {
          try {
            callback();
          } catch (error) { }
        }, options.wait || 120);

        function stop() {
          if (observer) {
            observer.disconnect();
            observer = null;
          }
          if (stopTimer) {
            clearTimeout(stopTimer);
            stopTimer = null;
          }
          if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
          }
        }

        function start() {
          if (started) {
            return;
          }
          var target = typeof targetResolver === 'function' ? targetResolver() : document.body;
          if (!target) {
            return;
          }
          started = true;
          observer = new MutationObserver(run);
          observer.observe(target, {
            childList: true,
            subtree: true,
            attributes: !!options.attributes,
            attributeFilter: options.attributeFilter || undefined
          });
          run();
          if (options.maxMs && options.maxMs > 0) {
            stopTimer = setTimeout(stop, options.maxMs);
          } else if (options.maxMs === undefined) {
             stopTimer = setTimeout(stop, 4000);
          }
        }

        function boot() {
          start();
          if (!started) {
            var attempts = 0;
            pollTimer = setInterval(function () {
              attempts += 1;
              start();
              if (started || attempts >= 20) {
                if (!started) {
                  run();
                }
                clearInterval(pollTimer);
                pollTimer = null;
              }
            }, 150);
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', boot, { once: true });
        } else {
          boot();
        }
      }

      var sharedJsonPromises = {};

      window.__boomerPerf = {
        observeBody: function (callback, options) {
          startObserver(function () { return document.body; }, callback, options);
        },
        observeSelector: function (selector, callback, options) {
          startObserver(function () { return document.querySelector(selector); }, callback, options);
        },
        isAdminUiActive: function () {
          return !!(
            document.querySelector('.admin-view, .admin-main, .admin-table, [data-admin-gallery-manager], [data-admin-category-banner-manager], .admin-form, .admin-sidebar') ||
            /admin|yonetim|panel/i.test(String(window.location.hash || ''))

        fetchJsonOnce: function (key, url, fetchOptions) {
          if (sharedJsonPromises[key]) {
            return sharedJsonPromises[key];
          }
          sharedJsonPromises[key] = fetch(url, fetchOptions || {})
            .then(function (response) {
              if (!response.ok) {
                throw new Error('request failed');
              }
              return response.json();
            })
            .catch(function (error) {
              delete sharedJsonPromises[key];
              throw error;
            });
          return sharedJsonPromises[key];
        }
      };

      function redirectAdminRouteIfNeeded() {
        var path = String(window.location.pathname || '');
        if (path === '/admin' || path === '/admin/') {
          return;
        }
        var hasAdminUi = !!document.querySelector('.admin-container, .admin-main, .admin-view, .admin-sidebar');
        if (!hasAdminUi) {
          return;
        }
        window.location.replace('/admin');
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          window.__boomerPerf.observeBody(redirectAdminRouteIfNeeded, { maxMs: 15000, wait: 120 });
        }, { once: true });
      } else {
        window.__boomerPerf.observeBody(redirectAdminRouteIfNeeded, { maxMs: 15000, wait: 120 });
      }

  <script>
    (function () {
      var originalFetch = window.fetch;
      var legacyApiBase = 'https://boomeritems.com/api';
      var currentApiBase = window.location.origin + '/api';
      var paytrOverlay = null;

      function createJsonResponse(payload, status) {
        return new Response(JSON.stringify(payload), {
          status: status,
          headers: { 'Content-Type': 'application/json; charset=utf-8' }
        });
      }

      function parseBody(init) {
        if (!init || !init.body || typeof init.body !== 'string') {
          return null;
        }

        try {
          return JSON.parse(init.body);
        } catch (error) {
          return null;
        }
      }

      function showAuthError(message) {
        var text = message || 'E-posta veya şifre hatalı.';

        window.setTimeout(function () {
          window.alert(text);
        }, 0);
      }

      function getStoredToken() {
        try {
          return localStorage.getItem('token') || '';
        } catch (error) {
          return '';
        }
      }

      function withAuthHeader(input, init) {
        var token = getStoredToken();
        if (!token) {
          return { input: input, init: init };
        }

        var url = typeof input === 'string'
          ? input
          : (input && typeof input.url === 'string' ? input.url : '');

        if (url.indexOf('/api/') === -1) {
          return { input: input, init: init };
        }

        if (input instanceof Request) {
          var requestHeaders = new Headers(input.headers || {});
          if (!requestHeaders.has('Authorization')) {
            requestHeaders.set('Authorization', 'Bearer ' + token);
            input = new Request(input, { headers: requestHeaders });
          }
          return { input: input, init: init };
        }

        var nextInit = Object.assign({}, init || {});
        var headers = new Headers(nextInit.headers || {});
        if (!headers.has('Authorization')) {
          headers.set('Authorization', 'Bearer ' + token);
        }
        nextInit.headers = headers;
        return { input: input, init: nextInit };
      }

      function normalizeCartStockValue(value) {
        return String(value || '')
          .toLocaleLowerCase('tr-TR')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function clampCartItemsPayload(value) {
        if (typeof value !== 'string') {
          return value;
        }

        var stockState = window.__boomerStockState || { byId: {}, byName: {} };
        var parsed;
        try {
          parsed = JSON.parse(value);
        } catch (error) {
          return value;
        }

        if (!Array.isArray(parsed)) {
          return value;
        }

        var clamped = parsed.map(function (item) {
          var stockInfo = stockState.byId[String(item.id || '')]
            || stockState.byName[normalizeCartStockValue(item.title || item.name || '')]
            || null;

          if (!stockInfo) {
            return item;
          }

          var availableQty = Math.max(0, Number(stockInfo.stock || 0));
          if (!stockInfo.isActive || !stockInfo.inStock || availableQty <= 0) {
            return null;
          }

          var currentQty = Math.max(1, Number(item.qty || item.quantity || 1));
          var nextQty = Math.min(currentQty, availableQty);

          return Object.assign({}, item, {
            qty: nextQty,
            quantity: nextQty
          });
        }).filter(Boolean);

        return JSON.stringify(clamped);
      }

      if (!window.__cartStorageClampInstalled) {
        window.__cartStorageClampInstalled = true;
        var originalSetItem = localStorage.setItem.bind(localStorage);
        localStorage.setItem = function (key, value) {

      function openPaytrOverlay(payment) {

        var isAuthLogin = typeof input === 'string'
          && input.indexOf('/api/auth/login') !== -1
          && init
          && String(init.method || 'GET').toUpperCase() === 'POST';

        if (typeof input === 'string' && input.indexOf(legacyApiBase) === 0) {
          input = currentApiBase + input.slice(legacyApiBase.length);
        } else if (input instanceof Request && input.url.indexOf(legacyApiBase) === 0) {
          input = new Request(currentApiBase + input.url.slice(legacyApiBase.length), input);
        }

        init = authedRequest.init;

            response.clone().json().then(function (payload) {

            }).catch(function () {

          return response.clone().json().then(function (payload) {

            return openPaytrOverlay(payload.payment).then(function (status) {

            return response;

        });

  <script>
    (function () {
      var apiBase = window.location.origin + '/api';
      var cache = {
        cities: null,
        districtsByCity: {}
      };

      function fetchJson(url) {
        return fetch(url).then(function (response) {
          if (!response.ok) {
            throw new Error('Request failed: ' + response.status);
          }
          return response.json();
        });
      }

      function ensureNeighborhoodInput(form) {
        var neighborhoodField = form.querySelector('#checkout-neighborhood');
        if (!neighborhoodField) {
          return null;
        }

        if (neighborhoodField.tagName === 'INPUT') {
          neighborhoodField.disabled = false;
          neighborhoodField.required = true;
          neighborhoodField.placeholder = 'Mahalle giriniz';
          return neighborhoodField;
        }

        var input = document.createElement('input');
        input.type = 'text';
        input.name = neighborhoodField.name || 'neighborhood';
        input.id = neighborhoodField.id || 'checkout-neighborhood';
        input.required = true;
        input.disabled = false;
        input.placeholder = 'Mahalle giriniz';
        input.className = neighborhoodField.className;
        input.value = neighborhoodField.value || '';

        Array.prototype.forEach.call(neighborhoodField.attributes, function (attribute) {
          if (['type', 'name', 'id', 'required', 'disabled', 'placeholder', 'value'].indexOf(attribute.name) !== -1) {
            return;
          }
          input.setAttribute(attribute.name, attribute.value);
        });

        neighborhoodField.parentNode.replaceChild(input, neighborhoodField);
        return input;
      }

      function forceEnable(el) {
        if (!el) return;
        try {
          // Hard override on the element instance to prevent any script from disabling it
          Object.defineProperty(el, 'disabled', {
            get: function() { return false; },
            set: function() { /* ignore */ },
            configurable: true
          });
          el.removeAttribute('disabled');
          el.style.pointerEvents = 'auto';
          el.style.opacity = '1';
        } catch (e) {}
      }

      function ensureStreetInput(form) {
        var streetField = form.querySelector('[name="street"]') || form.querySelector('#checkout-street');
        if (!streetField) {
          return null;
        }

        var input;
        if (streetField.tagName === 'INPUT') {
          input = streetField;
        } else {
          input = document.createElement('input');
          input.type = 'text';
          input.name = streetField.name || 'street';
          input.id = streetField.id || 'checkout-street';
          input.className = streetField.className;
          
          Array.prototype.forEach.call(streetField.attributes, function (attribute) {
            if (['type', 'name', 'id', 'required', 'disabled', 'placeholder', 'value'].indexOf(attribute.name) !== -1) {
              return;
            }
            input.setAttribute(attribute.name, attribute.value);
          });
          
          streetField.parentNode.replaceChild(input, streetField);
        }

        forceEnable(input);
        input.required = true;
        input.placeholder = 'Sokak / Cadde giriniz';
        
        var listId = 'checkout-street-list';
        input.setAttribute('list', listId);

        var dataList = form.querySelector('#' + listId);
        if (!dataList) {
          dataList = document.createElement('datalist');
          dataList.id = listId;
          form.appendChild(dataList);
        }

        return {
          input: input,
          list: dataList
        };
      }

      function fillStreetList(target, items, placeholder) {
        var currentValue = target.input.value;
        target.input.placeholder = placeholder;
        target.list.innerHTML = '';

        items.forEach(function (item) {
          var option = document.createElement('option');
          option.value = item.full_name || item.name;
          target.list.appendChild(option);
        });
        target.input.value = currentValue;
      }

      function getSelectedOptionId(select) {
        if (!select) {
          return null;
        }

        var option = select.options[select.selectedIndex];
        if (!option || !option.dataset.id) {
          return null;
        }

        return option.dataset.id;
      }

      function loadCities() {
        if (cache.cities) {
          return Promise.resolve(cache.cities);
        }

        return fetchJson(apiBase + '/shipping/cities').then(function (cities) {
          cache.cities = Array.isArray(cities) ? cities : [];
          return cache.cities;
        });
      }

      function resolveCityId(citySelect) {
        var optionId = getSelectedOptionId(citySelect);
        if (optionId) {
          return Promise.resolve(Number(optionId));
        }

        return loadCities().then(function (cities) {
          var selectedName = citySelect.value;
          var city = cities.find(function (item) { return item.name === selectedName; });
          return city ? Number(city.id) : null;
        });
      }

      function loadDistricts(cityId) {
        if (!cityId) {
          return Promise.resolve([]);
        }

        if (cache.districtsByCity[cityId]) {
          return Promise.resolve(cache.districtsByCity[cityId]);
        }

        return fetchJson(apiBase + '/shipping/districts/' + cityId).then(function (districts) {
          cache.districtsByCity[cityId] = Array.isArray(districts) ? districts : [];
          return cache.districtsByCity[cityId];
        });
      }

      function resolveDistrictId(citySelect, districtSelect) {
        var optionId = getSelectedOptionId(districtSelect);
        if (optionId) {
          return Promise.resolve(Number(optionId));
        }

        return resolveCityId(citySelect).then(function (cityId) {
          return loadDistricts(cityId).then(function (districts) {
            var district = districts.find(function (item) { return item.name === districtSelect.value; });
            return district ? Number(district.id) : null;
          });
        });
      }

      function updateManualAddressFields(form) {
        var districtSelect = form.querySelector('#checkout-district');
        var neighborhoodInput = ensureNeighborhoodInput(form);
        var streetTarget = ensureStreetInput(form);

        if (!districtSelect || !neighborhoodInput || !streetTarget) {
          return;
        }

        // ABSOLUTELY FORCE ENABLED - No matter what.
        forceEnable(neighborhoodInput);
        forceEnable(streetTarget.input);
        
        var hasDistrict = districtSelect.value && districtSelect.value.trim() !== '';

        if (!hasDistrict) {
          neighborhoodInput.placeholder = 'Lütfen önce ilçe seçiniz';
          fillStreetList(streetTarget, [], 'Lütfen önce ilçe seçiniz');
          return;
        }

        neighborhoodInput.placeholder = 'Mahalle giriniz';
        fillStreetList(streetTarget, [], 'Sokak / Cadde giriniz');
      }

      function syncOptionIds(select, items) {
        if (!select || !Array.isArray(items)) {
          return;
        }

        Array.prototype.forEach.call(select.options, function (option) {
          var item = items.find(function (entry) { return entry.name === option.value || entry.name === option.textContent; });
          if (item) {
            option.dataset.id = String(item.id);
          }
        });
      }

      function wireCheckoutForm(form) {
        if (!form || form.dataset.locationWired === '1') {
          return;
        }

        form.dataset.locationWired = '1';

        var citySelect = form.querySelector('#checkout-city');
        var districtSelect = form.querySelector('#checkout-district');
        var neighborhoodInput = ensureNeighborhoodInput(form);

        ensureStreetInput(form);

        if (!citySelect || !districtSelect || !neighborhoodInput) {
          return;
        }

        var bootstrapRuns = 0;
        var bootstrapTimer = setInterval(function () {
          bootstrapRuns += 1;
          refreshCityIds();
          refreshDistrictIds();
          updateManualAddressFields(form);

          if (bootstrapRuns >= 8 || !document.body.contains(form)) {
            clearInterval(bootstrapTimer);
          }
        }, 400);

        function refreshCityIds() {
          loadCities().then(function (cities) {
            syncOptionIds(citySelect, cities);
          }).catch(function () { });
        }

        function refreshDistrictIds() {
          resolveCityId(citySelect).then(function (cityId) {
            return loadDistricts(cityId);
          }).then(function (districts) {
            syncOptionIds(districtSelect, districts);
          }).catch(function () { });
        }

        refreshCityIds();
        updateManualAddressFields(form);

        citySelect.addEventListener('change', function () {
          setTimeout(function () {
            refreshDistrictIds();
            updateManualAddressFields(form);
          }, 0);
        });

        districtSelect.addEventListener('change', function () {
          setTimeout(function () {
            updateManualAddressFields(form);
          }, 0);
        });

        citySelect.addEventListener('focus', refreshCityIds);
        districtSelect.addEventListener('focus', refreshDistrictIds);
      }

      function boot() {
        var form = document.getElementById('checkout-form');
        if (form) {
          wireCheckoutForm(form);
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        boot();
        window.__boomerPerf.observeBody(boot, { maxMs: 3000, wait: 120 });
      });
    })();
  </script>

        overlay.style.display = 'grid';

        var card = document.createElement('div');
        card.style.width = 'min(92vw, 520px)';
        card.style.background = '#ffffff';
        card.style.borderRadius = '20px';
        card.style.padding = '32px';
        card.style.textAlign = 'center';
        card.style.boxShadow = '0 24px 60px rgba(15,23,42,0.3)';

        var title = isSuccess ? 'Ödeme Başarılı!' : 'Ödeme Tamamlanamadı';
        var btnText = isSuccess ? 'Alışverişe Devam Et' : 'Tekrar Dene';
        var btnColor = isSuccess ? '#22c55e' : '#dd101f';

        card.style.fontFamily = "'Inter', sans-serif";
        card.innerHTML =
          '<img src="/logo_full.png" alt="BoomerItems" style="max-width:220px;width:100%;height:auto;margin-bottom:18px;">' +
          '<h3 style="margin:0 0 12px;color:#0f172a;font-family:\'Inter\',sans-serif;font-weight:800;">' + title + '</h3>' +
          '<p style="margin:0 0 12px;color:#475569;font-family:\'Inter\',sans-serif;">' + (message || '') + '</p>' +
          '<p style="margin:0 0 24px;font-weight:700;color:#dd101f;font-family:\'Inter\',sans-serif;">' + (orderId ? 'Sipariş No: ' + orderId : '') + '</p>' +
          '<button type="button" style="border:0;border-radius:12px;padding:14px 20px;background:' + btnColor + ';color:#fff;font-weight:700;cursor:pointer;font-family:\'Inter\',sans-serif;text-transform:uppercase;">' + btnText + '</button>';

        card.querySelector('button').addEventListener('click', function () {
          overlay.remove();
          if (isSuccess) {
            window.location.reload();
          } else {
            // Re-trigger submitOrder to use cached payment or show error
            var form = document.getElementById('checkout-form');
            var btn = document.querySelector('.confirm-order-btn');
            if (form && btn) {
              submitOrder(form, btn);
            }
          }
        });

        overlay.appendChild(card);
        document.body.appendChild(overlay);
      }

      function openPaymentOverlay(payment, orderId) {
        if (!payment || !payment.payment_url) {
          createSuccessOverlay(orderId, 'Ödeme bağlantısı oluşturulamadı. Siparişiniz yine de alındı.');
          return;
        }

        var overlay = document.createElement('div');
        overlay.style.position = 'fixed';
        overlay.style.inset = '0';
        overlay.style.background = 'rgba(15,23,42,0.76)';
        overlay.style.zIndex = '1000001';
        overlay.style.display = 'grid';
        overlay.style.placeItems = 'center';

        var frameWrap = document.createElement('div');
        frameWrap.style.width = 'min(96vw, 980px)';
        frameWrap.style.height = 'min(92vh, 760px)';
        frameWrap.style.background = '#fff';
        frameWrap.style.borderRadius = '18px';
        frameWrap.style.overflow = 'hidden';
        frameWrap.style.position = 'relative';

        var close = document.createElement('button');
        close.type = 'button';
        close.textContent = 'Kapat';
        close.style.position = 'absolute';
        close.style.top = '14px';
        close.style.right = '14px';
        close.style.zIndex = '2';
        close.style.border = '0';
        close.style.borderRadius = '10px';
        close.style.padding = '10px 14px';
        close.style.cursor = 'pointer';
        close.style.fontFamily = "'Inter', sans-serif";
        close.style.fontWeight = "700";

        var iframe = document.createElement('iframe');
        iframe.src = payment.payment_url;
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.border = '0';

        function cleanup() {
          window.removeEventListener('message', onMessage);
          overlay.remove();
        }

        function onMessage(event) {
          var data = event.data || {};
          if (data.source !== 'boomeritems-paytr' || data.orderId !== orderId) {
            return;
          }
          cleanup();
          if (data.status === 'success') {
            createSuccessOverlay(orderId, 'Ödemeniz başarıyla alındı. LEGO setleriniz hazırlanıyor!', true);
          } else {
            createSuccessOverlay(orderId, 'Ödeme işlemi sırasında bir hata oluştu veya iptal edildi. Lütfen tekrar deneyin.', false);
          }
        }

        close.addEventListener('click', function () {
          cleanup();
          createSuccessOverlay(orderId, 'Ödeme işlemi iptal edildi. Siparişinizi tamamlamak için lütfen ödemeyi gerçekleştirin.', false);
        });

        window.addEventListener('message', onMessage);
        frameWrap.appendChild(close);
        frameWrap.appendChild(iframe);
        overlay.appendChild(frameWrap);
        document.body.appendChild(overlay);

      function buildOrderPayload(form) {
        var cartItems = parseCartItems();
        if (!cartItems.length) {
          throw new Error('Sepetiniz bos.');
        }

        var stockState = window.__boomerStockState || { byId: {}, byName: {} };
        var adjustedItems = [];
        var changedItems = [];
        function normalizeStockKey(value) {
          return String(value || '')
            .toLocaleLowerCase('tr-TR')
            .replace(/\s+/g, ' ')
            .trim();
        }

        cartItems.forEach(function (item) {
          var requestedQty = Number(item.qty || item.quantity || 1);
          var stockInfo = stockState.byId[String(item.id || '')] || stockState.byName[normalizeStockKey(item.title || item.name || '')] || null;
          var availableQty = stockInfo ? Number(stockInfo.stock || 0) : null;
          var finalQty = requestedQty;

          if (availableQty !== null) {
            if (availableQty <= 0) {
              finalQty = 0;
            } else if (requestedQty > availableQty) {
              finalQty = availableQty;
            }
          }

          if (finalQty !== requestedQty) {
            changedItems.push({
              title: item.title || 'Urun',
              requested: requestedQty,
              finalQty: finalQty,
              available: availableQty
            });
          }

          if (finalQty > 0) {
            adjustedItems.push(Object.assign({}, item, {
              qty: finalQty,
              quantity: finalQty
            }));
          }
        });

        if (changedItems.length) {
          localStorage.setItem('cartItems', JSON.stringify(adjustedItems));
          var firstChange = changedItems[0];
          if (firstChange.finalQty <= 0) {
            throw new Error("'" + firstChange.title + "' stokta kalmadi. Urun sepetinizden kaldirildi.");
          }
          throw new Error("'" + firstChange.title + "' icin stokta " + firstChange.available + " adet var. Sepet adedi buna gore guncellendi.");
        }

        var couponInput = document.querySelector('.summary-coupon input[type="text"]');
        var shippingAddress = {
          fullname: (form.querySelector('input[name="fullname"]') || {}).value || '',
          phone: (form.querySelector('input[name="phone"]') || {}).value || '',
          email: (form.querySelector('input[name="email"]') || {}).value || '',
          city: (form.querySelector('#checkout-city') || {}).value || '',
          district: (form.querySelector('#checkout-district') || {}).value || '',
          neighborhood: (form.querySelector('#checkout-neighborhood') || {}).value || '',
          street: (form.querySelector('input[name="street"]') || {}).value || '',
          address_detail: (form.querySelector('textarea[name="address_detail"]') || {}).value || ''
        };

        var totalAmount = 0;
        var shippingCost = 0;
        var totalsArea = document.querySelector('.summary-totals');
        if (totalsArea) {
          var rows = totalsArea.querySelectorAll('.summary-row');
          Array.prototype.forEach.call(rows, function (row) {
            var text = (row.textContent || '').toLocaleLowerCase('tr-TR');
            if (text.indexOf('genel toplam') !== -1) {
               totalAmount = parsePrice(row.textContent);
            } else if (text.indexOf('kargo') !== -1) {
               shippingCost = parsePrice(row.textContent);
            }
          });
        }

        return {
          shippingAddress: shippingAddress,
          total_amount: totalAmount,
          shipping_cost: shippingCost,
          order_note: (form.querySelector('textarea[name="order_note"]') || {}).value || '',
          payment_method: 'card', // FORCE CARD FOR PAYTR
          coupon_code: couponInput ? couponInput.value : '',
          gift_wrap: !!(form.querySelector('.checkbox-label input[type="checkbox"]') || {}).checked,
          items: adjustedItems.map(function (item) {
            return {
              id: item.id,
              qty: item.qty || item.quantity || 1,
              desi: item.desi || 1,
              title: item.title || '',
              price: item.price || 0,
              img: item.img || ''
            };
          })
        };
      }

      var lastPendingOrder = null;

      function submitOrder(form, button) {
        if (button.dataset.loading === '1') {
          return;
        }

        var payload = buildOrderPayload(form);
        
        // If we have a last order with same items/total, don't create new one, just reopen payment
        if (lastPendingOrder && JSON.stringify(lastPendingOrder.payload.items) === JSON.stringify(payload.items)) {
           console.log('Reusing last pending order for PayTR');
           openPaymentOverlay(lastPendingOrder.data.payment, lastPendingOrder.data.id);
           return;
        }

        button.dataset.loading = '1';
        button.disabled = true;
        var originalText = button.textContent;
        button.textContent = 'Sipariş Gönderiliyor...';

        fetch(apiBase + '/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
          .then(function (response) {
            return response.json().then(function (data) {
              if (!response.ok) {
                throw new Error(data.message || 'Sipariş oluşturulamadı.');
              }
              return data;
            });
          })
          .then(function (data) {
            console.log('Order created:', data);
            
            // Cache this order in case user cancels and retries immediately
            if (data.payment && data.payment.payment_url) {
              lastPendingOrder = { payload: payload, data: data };
              openPaymentOverlay(data.payment, data.id);
            } else {
              createSuccessOverlay(data.id, 'Siparişiniz alındı ancak ödeme sayfası açılamadı.', false);
            }
          })
          .catch(function (error) {
            alert(error.message || 'Sipariş sırasında hata oluştu.');
          })
          .finally(function () {
            button.dataset.loading = '0';
            button.disabled = false;
            button.textContent = originalText;
          });
      }

      function wireManualCheckout(form) {
        if (!form || form.dataset.manualCheckoutWired === '1') {
          return;
        }

        var confirmButton = getCheckoutRoot(form).querySelector('.confirm-order-btn');
        if (!confirmButton) {
          return;
        }

        form.dataset.manualCheckoutWired = '1';
        ensureBackButton(form);
        setStep(form, 1);

        confirmButton.addEventListener('click', function (event) {
          event.preventDefault();
          event.stopImmediatePropagation();

          var firstStep = getVisibleStepContents(form)[0];
          if (!validateStep(firstStep)) {
            return;
          }

          submitOrder(form, confirmButton);
        }, true);
      }

      function boot() {
        var form = document.getElementById('checkout-form');
        if (form) {
          wireManualCheckout(form);
          if (form.dataset.manualCheckoutBootstrap !== '1') {
            form.dataset.manualCheckoutBootstrap = '1';
            var attempts = 0;
            var timer = setInterval(function () {
              attempts += 1;
              wireManualCheckout(form);
              if (form.dataset.manualCheckoutWired === '1' || attempts >= 12 || !document.body.contains(form)) {
                clearInterval(timer);
              }
            }, 300);
          }
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        boot();
        window.__boomerPerf.observeBody(boot, { maxMs: 3000, wait: 120 });
      });
    })();

  <script>
    (function () {
      var apiBase = window.location.origin + '/api';
      var stockByName = {};
      var stockById = {};

      function normalize(value) {
        return String(value || '')
          .toLocaleLowerCase('tr-TR')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function stockText(stockInfo) {
        if (!stockInfo || !stockInfo.isActive || stockInfo.stock <= 0 || !stockInfo.inStock) {
          return 'Stokta yok';
        }
        return 'Stokta ' + stockInfo.stock + ' adet';
      }

      function stockClass(stockInfo) {
        if (!stockInfo || !stockInfo.isActive || stockInfo.stock <= 0 || !stockInfo.inStock) {
          return 'stock-inline-note out';
        }
        if (stockInfo.stock <= 3) {
          return 'stock-inline-note low';
        }
        return 'stock-inline-note';
      }

      function loadStockMap() {
        return window.__boomerPerf.fetchJsonOnce('products-summary', apiBase + '/products?summary=1').then(function (products) {
          var list = Array.isArray(products) ? products : [];
          stockByName = {};
          stockById = {};
          list.forEach(function (product) {
            var mapped = {
              stock: Number(product.stock || 0),
              inStock: !!product.in_stock,
              isActive: product.isActive !== false && product.is_active !== 0
            };
            stockByName[normalize(product.name || product.title)] = mapped;
            stockById[String(product.id || '')] = mapped;
          });
          window.__boomerStockState = {
            byName: stockByName,
            byId: stockById
          };
          syncStoredCart();
          decorateCards();
          decorateCartAndSummary();
        }).catch(function () { });
      }

      function findCardTitle(card) {
        var titleNode = card.querySelector('h1, h2, h3, h4, h5, [data-product-title], .product-title');
        return titleNode ? normalize(titleNode.textContent) : '';
      }

      function ensureBadge(card) {
        var badge = card.querySelector('.stock-badge-out');
        if (badge) {
          return badge;
        }

        badge = document.createElement('div');
        badge.className = 'stock-badge-out';
        badge.textContent = 'Tukendi';
        badge.style.position = 'absolute';
        badge.style.top = '12px';
        badge.style.left = '12px';
        card.appendChild(badge);
        return badge;
      }

      function ensureInlineNote(container, stockInfo) {
        if (!container) {
          return;
        }
        var note = container.querySelector('.stock-inline-note');
        if (!note) {
          note = document.createElement('div');
          note.className = 'stock-inline-note';
          container.appendChild(note);
        }
        note.className = stockClass(stockInfo);
        note.textContent = stockText(stockInfo);
      }

      function lookupStockInfo(id, title) {
        return stockById[String(id || '')] || stockByName[normalize(title)] || null;
      }

      function syncStoredCart() {
        var raw;
        try {
          raw = JSON.parse(localStorage.getItem('cartItems') || '[]');
        } catch (error) {
          raw = [];
        }
        if (!Array.isArray(raw) || !raw.length) {
          return;
        }

        var changed = false;
        var filtered = raw.map(function (item) {
          var stockInfo = lookupStockInfo(item.id, item.title || item.name || '');
          if (!stockInfo) {
            return item;
          }

          var availableQty = Math.max(0, Number(stockInfo.stock || 0));
          var currentQty = Math.max(1, Number(item.qty || item.quantity || 1));
          var nextQty = Math.min(currentQty, availableQty || currentQty);

          if (!stockInfo.isActive || !stockInfo.inStock || availableQty <= 0) {
            changed = true;
            return null;
          }

          if (nextQty !== currentQty) {
            changed = true;
            return Object.assign({}, item, {
              qty: nextQty,
              quantity: nextQty
            });
          }

          return item;
        }).filter(Boolean);

        if (changed) {
          localStorage.setItem('cartItems', JSON.stringify(filtered));
        }
      }

      function decorateCards() {
        var cards = document.querySelectorAll('article, .product-card, .card, .product-item');
        Array.prototype.forEach.call(cards, function (card) {
          var name = findCardTitle(card);
          if (!name || !stockByName[name]) {
            return;
          }

          var stockInfo = stockByName[name];
          var isOut = !stockInfo.isActive || !stockInfo.inStock || stockInfo.stock <= 0;
          var button = Array.prototype.find.call(
            card.querySelectorAll('button, a'),
            function (node) {
              var text = normalize(node.textContent);
              return text.indexOf('sepete') !== -1 || text.indexOf('satın al') !== -1 || text.indexOf('satin al') !== -1;
            }
          );

          if (!isOut) {
            var infoContainer = card.querySelector('.product-info, .admin-product-cell, .summary-item-info') || card;
            ensureInlineNote(infoContainer, stockInfo);
            return;
          }

          card.classList.add('stock-card-out');
          ensureBadge(card);
          ensureInlineNote(card.querySelector('.product-info, .admin-product-cell, .summary-item-info') || card, stockInfo);

          if (button) {
            button.classList.add('stock-disabled-btn');
            if (button.tagName === 'BUTTON') {
              button.disabled = true;
            }
            button.textContent = 'Tukendi';
          }
        });
      }

      function getCartQuantityForTitle(title) {
        var raw;
        try {
          raw = JSON.parse(localStorage.getItem('cartItems') || '[]');
        } catch (error) {
          raw = [];
        }

        if (!Array.isArray(raw)) {
          return 0;
        }

        var normalizedTitle = normalize(title);
        return raw.reduce(function (sum, item) {
          if (normalize(item.title || item.name || '') !== normalizedTitle) {
            return sum;
          }
          return sum + Math.max(0, Number(item.qty || item.quantity || 0));
        }, 0);
      }

      function preventOverAdd(event) {
        var button = event.target.closest('button, a');
        if (!button) {
          return;
        }

        var text = normalize(button.textContent);
        if (text.indexOf('sepete ekle') === -1) {
          return;
        }

        var card = button.closest('article, .product-card, .card, .product-item');
        if (!card) {
          return;
        }

        var titleNode = card.querySelector('h1, h2, h3, h4, h5, [data-product-title], .product-title');
        var title = titleNode ? titleNode.textContent : '';
        var stockInfo = lookupStockInfo('', title);
        if (!stockInfo) {
          return;
        }

        var cartQty = getCartQuantityForTitle(title);
        if (!stockInfo.isActive || !stockInfo.inStock || stockInfo.stock <= 0) {
          event.preventDefault();
          event.stopImmediatePropagation();
          alert('Bu urun stokta yok.');
          return;
        }

        if (cartQty >= stockInfo.stock) {
          event.preventDefault();
          event.stopImmediatePropagation();
          alert("Bu urunden en fazla " + stockInfo.stock + " adet ekleyebilirsiniz.");
        }
      }

      function decorateCartAndSummary() {
        var items = document.querySelectorAll('.cart-item, .summary-item');
        Array.prototype.forEach.call(items, function (itemNode) {
          var titleNode = itemNode.querySelector('h1, h2, h3, h4, h5, .summary-item-title');
          var title = titleNode ? titleNode.textContent : '';
          var stockInfo = lookupStockInfo('', title);
          if (!stockInfo) {
            return;
          }
          var infoContainer = itemNode.querySelector('.cart-item-info, .summary-item-info') || itemNode;
          ensureInlineNote(infoContainer, stockInfo);
        });
      }

      function updateStoredCartQuantity(title, nextQty) {
        var raw;
        try {
          raw = JSON.parse(localStorage.getItem('cartItems') || '[]');
        } catch (error) {
          raw = [];
        }

        if (!Array.isArray(raw) || !raw.length) {
          return;
        }

        var normalizedTitle = normalize(title);
        var updated = raw.map(function (item) {
          if (normalize(item.title || item.name || '') !== normalizedTitle) {
            return item;
          }
          return Object.assign({}, item, {
            qty: nextQty,
            quantity: nextQty
          });
        }).filter(function (item) {
          return Number(item.qty || item.quantity || 0) > 0;
        });

        localStorage.setItem('cartItems', JSON.stringify(updated));
      }

      function ensureCartQuantityControls() {
        var cartItems = document.querySelectorAll('.cart-item');
        Array.prototype.forEach.call(cartItems, function (itemNode) {
          var infoContainer = itemNode.querySelector('.cart-item-info');
          var titleNode = itemNode.querySelector('h1, h2, h3, h4, h5');
          var qtyTextNode = Array.prototype.find.call(infoContainer ? infoContainer.querySelectorAll('span, p, div') : [], function (node) {
            return normalize(node.textContent).indexOf('adet:') === 0;
          });

          if (!infoContainer || !titleNode || !qtyTextNode) {
            return;
          }

          var stockInfo = lookupStockInfo('', titleNode.textContent);
          if (!stockInfo || !stockInfo.isActive || stockInfo.stock <= 0) {
            return;
          }

          var match = String(qtyTextNode.textContent || '').match(/(\d+)/);
          var currentQty = match ? Number(match[1]) : 1;
          var maxQty = Math.max(1, Number(stockInfo.stock || 1));
          var controls = infoContainer.querySelector('.cart-qty-controls');

          qtyTextNode.textContent = 'Adet: ' + currentQty;

          if (!controls) {
            controls = document.createElement('div');
            controls.className = 'cart-qty-controls';
            controls.innerHTML =
              '<button type="button" class="cart-qty-btn cart-qty-minus">-</button>' +
              '<span class="cart-qty-value"></span>' +
              '<button type="button" class="cart-qty-btn cart-qty-plus">+</button>';
            qtyTextNode.insertAdjacentElement('afterend', controls);
          }

          var minus = controls.querySelector('.cart-qty-minus');
          var plus = controls.querySelector('.cart-qty-plus');
          var value = controls.querySelector('.cart-qty-value');

          value.textContent = String(currentQty);
          minus.disabled = currentQty <= 1;
          plus.disabled = currentQty >= maxQty;

          if (controls.dataset.bound !== '1') {
            controls.dataset.bound = '1';

            controls.addEventListener('click', function (event) {
              var button = event.target.closest('.cart-qty-btn');
              if (!button) {
                return;
              }

              var latestMatch = String(qtyTextNode.textContent || '').match(/(\d+)/);
              var latestQty = latestMatch ? Number(latestMatch[1]) : 1;
              var nextQty = button.classList.contains('cart-qty-plus') ? latestQty + 1 : latestQty - 1;
              nextQty = Math.max(1, Math.min(maxQty, nextQty));

              if (nextQty === latestQty) {
                return;
              }

              qtyTextNode.textContent = 'Adet: ' + nextQty;
              value.textContent = String(nextQty);
              minus.disabled = nextQty <= 1;
              plus.disabled = nextQty >= maxQty;
              updateStoredCartQuantity(titleNode.textContent, nextQty);

              var priceNode = itemNode.querySelector('.cart-item-info p');
              var priceText = priceNode ? priceNode.textContent : '';
              var numericPrice = Number(String(priceText).replace(/[^\d,.-]/g, '').replace(/\./g, '').replace(',', '.'));
              if (!isNaN(numericPrice) && numericPrice > 0) {
                var totals = document.querySelectorAll('.cart-total span:last-child');
                Array.prototype.forEach.call(totals, function (totalNode) {
                  var raw;
                  try {
                    raw = JSON.parse(localStorage.getItem('cartItems') || '[]');
                  } catch (error) {
                    raw = [];
                  }
                  var total = (Array.isArray(raw) ? raw : []).reduce(function (sum, item) {
                    var qty = Number(item.qty || item.quantity || 1);
                    var price = Number(item.price || 0);
                    return sum + (qty * price);
                  }, 0);
                  totalNode.textContent = total.toLocaleString('tr-TR') + ' ₺';
                });
              }
            });
          }
        });
      }

      document.addEventListener('DOMContentLoaded', function () {
        loadStockMap();
        document.addEventListener('click', preventOverAdd, true);
        window.__boomerPerf.observeBody(function () {
          decorateCards();
          decorateCartAndSummary();
          ensureCartQuantityControls();
        }, { maxMs: 3500, wait: 160 });
      });
    })();
  </script>
  <script>
    (function () {
      function findMenuToggle(header) {
        return header.querySelector('.mobile-only button, .mobile-only [role="button"], button.mobile-only, .mobile-only');
      }

      function closeMenu(header) {
        header.classList.remove('mobile-nav-open');

      function bindMobileHeader(header) {

          return;

        var nav = header.querySelector('.nav-menu');
        var toggle = findMenuToggle(header);
        if (!nav || !toggle) {

        header.dataset.mobileMenuBound = '1';
        toggle.classList.add('mobile-menu-toggle');

  <script>
    (function () {
      var apiBase = window.location.origin + '/api';
      var categoryRows = null;
      var categoryRowsPromise = null;
      var bannerManifest = null;
      var bannerManifestPromise = null;

      function normalize(value) {
        return String(value || '')
          .toLocaleLowerCase('tr-TR')
          .replace(/[ıi]/g, 'i')
          .replace(/[ğ]/g, 'g')
          .replace(/[ü]/g, 'u')
          .replace(/[ş]/g, 's')
          .replace(/[ö]/g, 'o')
          .replace(/[ç]/g, 'c')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function getCardLabel(card) {
        var titleNode = card.querySelector('h1, h2, h3, h4, h5');
        return titleNode ? normalize(titleNode.textContent) : '';
      }

      function getCategoryBannerMap() {
        return {};
      }

      function loadCategories() {
        if (categoryRows) {
          return Promise.resolve(categoryRows);
        }
        if (!categoryRowsPromise) {
          categoryRowsPromise = fetch(apiBase + '/products/categories/list')
            .then(function (response) { return response.ok ? response.json() : []; })
            .then(function (rows) {
              categoryRows = Array.isArray(rows) ? rows : [];
              return categoryRows;
            })
            .catch(function () {
              categoryRows = [];
              return categoryRows;
            });
        }
        return categoryRowsPromise;
      }

      function resolveCategoryForCard(card) {
        var slug = card.getAttribute('data-category-slug');
        if (slug && categoryRows) {
          var bySlug = categoryRows.find(function (row) {
            return String(row.slug || '') === slug;
          });
          if (bySlug) {
            return bySlug;
          }
        }

        var label = getCardLabel(card);
        return (categoryRows || []).find(function (row) {
          return normalize(row.name) === label || normalize(row.slug) === label;
        }) || null;
      }

      function loadBannerManifest() {
        if (bannerManifest) {
          return Promise.resolve(bannerManifest);
        }
        if (!bannerManifestPromise) {
          bannerManifestPromise = fetch(window.location.origin + '/api/upload/category-banner', {
            headers: (function () {
              var token = localStorage.getItem('token') || '';
              return token ? { Authorization: 'Bearer ' + token } : {};
            })()
          }).then(function (response) {
            return response.ok ? response.json() : {};
          }).then(function (data) {
            bannerManifest = data || {};
            return bannerManifest;
          }).catch(function () {
            bannerManifest = {};
            return bannerManifest;
          });
        }
        return bannerManifestPromise;
      }

      function enhanceCategoryImages() {
        Promise.all([loadCategories(), loadBannerManifest()]).then(function (result) {
          var rows = result[0] || [];
          var manifest = result[1] || {};
          var bannerMap = getCategoryBannerMap();

          if (manifest && typeof manifest === 'object') {
            Object.keys(manifest).forEach(function (slot) {
              var item = manifest[slot];
              if (!item || !item.url) {
                return;
              }
              var row = rows.find(function (category) {
                return String(category.slug || '') === slot;
              });
              if (row) {
                bannerMap[normalize(row.name)] = item.url;
              }
            });
          }

          var grid = document.querySelector('.category-grid');
          if (grid && rows.length) {
            grid.innerHTML = rows.map(function (row) {
              return '' +
                '<article class="category-block" data-category-slug="' + String(row.slug || '') + '" tabindex="0">' +
                '<img alt="' + String(row.name || '') + '">' +
                '<div class="category-block-info">' +
                '<h4>' + String(row.name || '') + '</h4>' +
                '<a href="#urunler" class="category-link">' + String(row.name || 'Kategori') + ' Setleri Kesfet</a>' +
                '</div>' +
                '</article>';
            }).join('');
          }

          var cards = document.querySelectorAll('.category-block');
          Array.prototype.forEach.call(cards, function (card, index) {
            var row = resolveCategoryForCard(card) || rows[index] || null;
            var label = row ? normalize(row.name) : getCardLabel(card);
            var targetSrc = bannerMap[label];
            var image = card.querySelector('img');
            var titleNode = card.querySelector('h1, h2, h3, h4, h5');
            var linkNode = card.querySelector('.category-link');

            if (row) {
              card.setAttribute('data-category-slug', row.slug || '');
              if (titleNode) {
                titleNode.textContent = row.name || titleNode.textContent;
              }
              if (linkNode) {
                linkNode.textContent = (row.name || 'Kategori') + ' Setleri Kesfet';
              }
            }

            if (targetSrc) {
              card.dataset.bannerApplied = '1';
              card.style.backgroundImage = 'url("' + targetSrc + '")';
              card.style.backgroundSize = 'cover';
              card.style.backgroundPosition = 'center';
              card.style.backgroundRepeat = 'no-repeat';
            }

            if (image) {
              image.style.display = 'none';
            }
          });
        });
      }

      function findProductsSection() {
        return document.querySelector('.products-section, #products, [data-products-section]');
      }

      function findMatchingFilter(label) {
        if (!label) {
          return null;
        }

        var normalizedAliases = [label];
        var buttons = document.querySelectorAll('.filter-btn, [data-category], [data-filter]');
        return Array.prototype.find.call(buttons, function (button) {
          var text = normalize(
            button.getAttribute('data-category') ||
            button.getAttribute('data-filter') ||
            button.textContent
          );

          return text && normalizedAliases.some(function (alias) {
            return text.indexOf(alias) !== -1 || alias.indexOf(text) !== -1;
          });
        }) || null;
      }

      function handleCategoryJump(card, event) {
        if (event) {
          event.preventDefault();
        }

        var category = resolveCategoryForCard(card);
        var label = normalize((category && (category.name || category.slug)) || getCardLabel(card));
        var productsSection = findProductsSection();
        var filterButton = findMatchingFilter(label);

        if (filterButton) {
          filterButton.click();
        }

        if (productsSection) {
          productsSection.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      }

      function bindCategoryCards() {
        var cards = document.querySelectorAll('.category-block');
        Array.prototype.forEach.call(cards, function (card) {
          if (card.dataset.jumpBound === '1') {
            return;
          }

          card.dataset.jumpBound = '1';
          card.style.cursor = 'pointer';

          card.addEventListener('click', function (event) {
            handleCategoryJump(card, event);
          });

          card.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' || event.key === ' ') {
              handleCategoryJump(card, event);
            }
          });

          if (!card.hasAttribute('tabindex')) {
            card.setAttribute('tabindex', '0');
          }
        });
      }

      document.addEventListener('DOMContentLoaded', function () {
        enhanceCategoryImages();
        bindCategoryCards();
        window.__boomerPerf.observeSelector('.category-grid', function () {
          enhanceCategoryImages();
          bindCategoryCards();
        }, { maxMs: 3000, wait: 160 });
      });
    })();
  </script>

      function loadExistingProductImages(productId) {

            return response.json().catch(function () { return {}; });
          }
          return response.json().catch(function () { return {}; }).then(function (data) {

            '<div style="font-size:.7rem;color:#64748b;">' + (item.is_primary ? 'Kapak gorsel' : 'Ek gorsel') + '</div>' +

      function renderGalleryQueue(manager, list) {
        list.innerHTML = '';
        if (!adminProductState.pendingUploads.length) {
          list.innerHTML = '<div class="admin-gallery-empty">Yeni ekleyeceğiniz görseller burada sıralanır.</div>';
          return;
        }
        adminProductState.pendingUploads.forEach(function (item, index) {
          var card = document.createElement('div');
          card.className = 'admin-gallery-item';
          card.innerHTML =
            '<div class="admin-gallery-thumb"><img alt=""></div>' +
            '<div class="admin-gallery-meta">' +
            '<div style="font-size:.74rem;font-weight:700;color:#0f172a;word-break:break-word;">' + item.file.name + '</div>' +
            '<div style="font-size:.7rem;color:#64748b;">' + Math.round(item.file.size / 1024) + ' KB</div>' +
            '</div>' +
            '<div class="admin-gallery-actions">' +
            '<button type="button" class="admin-gallery-btn primary">Kapak</button>' +
            '<button type="button" class="admin-gallery-btn remove">Sil</button>' +
            '</div>';
          card.querySelector('img').src = item.url;
          if (adminProductState.primaryIndex === index) {
            card.querySelector('.primary').textContent = 'Kapak Görsel';
          }
          card.querySelector('.primary').addEventListener('click', function () {
            adminProductState.primaryIndex = index;
            renderGalleryQueue(manager, list);
          });
          card.querySelector('.remove').addEventListener('click', function () {
            adminProductState.pendingUploads.splice(index, 1);
            if (adminProductState.primaryIndex >= adminProductState.pendingUploads.length) {
              adminProductState.primaryIndex = 0;
            }
            renderGalleryQueue(manager, list);
          });
          list.appendChild(card);
        });

      function ensureGalleryManager(form) {
        window.ensureGalleryManager = ensureGalleryManager; // Global scope'a ekle
        var imageGroup = findInputGroup(form, ['urun gorseli']) || findInputGroup(form, ['ürün görseli']) || findInputGroup(form, ['gorsel']) || findInputGroup(form, ['görsel']);
        if (!imageGroup) {
          var uploadWrapper = form.querySelector('.admin-file-upload-wrapper');
          imageGroup = uploadWrapper ? (uploadWrapper.closest('.form-group, .admin-form-group, .col') || uploadWrapper.parentElement) : null;
        }
        // Fallback: Tüm file input'ları ara
        if (!imageGroup) {
          var fileInputs = form.querySelectorAll('input[type="file"]');
          for (var i = 0; i < fileInputs.length; i++) {
            if (fileInputs[i].accept && fileInputs[i].accept.indexOf('image') !== -1) {
              imageGroup = fileInputs[i].closest('.form-group, .admin-form-group, .col, div') || fileInputs[i].parentElement;
              break;
            }
          }
        }
        // Son çare: Formun sonuna ekle
        if (!imageGroup) {
          imageGroup = form;
        }

        var existingManager = form.querySelector('[data-admin-gallery-manager]');
        var legacyWrapper = imageGroup.querySelector('.admin-file-upload-wrapper');
        var managerAnchor = legacyWrapper || imageGroup;
        var legacyInput = imageGroup.querySelector('input[type="file"]');
        if (legacyInput) {
          legacyInput.multiple = true;
        }
        if (legacyInput && legacyInput.dataset.galleryMirrorBound !== '1') {
          legacyInput.dataset.galleryMirrorBound = '1';
          legacyInput.addEventListener('change', function (event) {
            var files = Array.prototype.slice.call(event.target.files || []).filter(function (file) {
              return file && /^image\//i.test(String(file.type || ''));
            });
            adminProductState.pendingUploads.forEach(function (item) {
              try { URL.revokeObjectURL(item.url); } catch (e) { }
            });
            adminProductState.pendingUploads = [];
            adminProductState.primaryIndex = 0;
            files.forEach(function (file) {
              adminProductState.pendingUploads.push({
                file: file,
                url: URL.createObjectURL(file)
              });
            });
            var mirroredManager = form.querySelector('[data-admin-gallery-manager]');
            if (mirroredManager) {
              var mirroredList = mirroredManager.querySelector('[data-role="pending-gallery"]');
              if (mirroredList) {
                renderGalleryQueue(mirroredManager, mirroredList);
              }
            }
          });
        }

        if (!adminMultiImageUiEnabled) {
          return;
        }

        if (existingManager) {
          return;
        }

        var manager = document.createElement('div');
        manager.className = 'admin-gallery-manager';
        manager.setAttribute('data-admin-gallery-manager', '1');
        manager.style.marginTop = '14px';
        manager.innerHTML =
          '<div class="admin-gallery-title">Çoklu Ürün Görselleri</div>' +
          '<div class="admin-gallery-help">Birden fazla görsel seçebilir, kapak görselini belirleyebilir ve kayıttan sonra otomatik yükletebilirsiniz.</div>' +
          '<label class="admin-gallery-pick">Görsel Seç<input class="admin-gallery-input" type="file" accept=\"image/*\" multiple></label>' +
          '<div class="admin-gallery-section-title">Mevcut Galeri</div>' +
          '<div class="admin-gallery-list" data-role="existing-gallery"></div>' +
          '<div class="admin-gallery-section-title">Yüklenecek Görseller</div>' +
          '<div class="admin-gallery-list" data-role="pending-gallery"></div>';

        managerAnchor.parentNode.insertBefore(manager, managerAnchor.nextSibling);
        if (legacyInput) {
          legacyInput.style.display = 'none';
        }
        if (legacyWrapper) {
          legacyWrapper.style.display = 'none';
        }
        var input = manager.querySelector('.admin-gallery-input');
        var existingList = manager.querySelector('[data-role="existing-gallery"]');
        var pendingList = manager.querySelector('[data-role="pending-gallery"]');

        function queueFiles(files, resetQueue) {
          var fileList = Array.prototype.slice.call(files || []).filter(function (file) {
            return file && /^image\//i.test(String(file.type || ''));
          });
          if (!fileList.length) {
            return;
          }
          if (resetQueue) {
            adminProductState.pendingUploads.forEach(function (item) {
              try { URL.revokeObjectURL(item.url); } catch (e) { }
            });
            adminProductState.pendingUploads = [];
            adminProductState.primaryIndex = 0;
          }
          fileList.forEach(function (file) {
            adminProductState.pendingUploads.push({
              file: file,
              url: URL.createObjectURL(file)
            });
          });
          renderGalleryQueue(manager, pendingList);
        }

        input.addEventListener('change', function (event) {
          queueFiles(event.target.files, false);
          input.value = '';
        });

        renderGalleryQueue(manager, pendingList);
        loadExistingProductImages(findCurrentProductId(form)).then(function () {
          renderExistingGallery(manager, existingList);
        });
      }

      function findProductIdFromResponse(data) {
        if (!data || typeof data !== 'object') {
          return null;
        }
        if (typeof data.id === 'string' && data.id) {
          return data.id;
        }
        if (data.product && (data.product.id || data.product.productId)) {
          return data.product.id || data.product.productId;
        }
        return null;
      }

      function resolveCurrentAdminProductId() {
        if (adminProductState.currentProductId) {
          return adminProductState.currentProductId;
        }
        
        // Try to get from URL (hash or query)
        var path = window.location.hash + window.location.search;
        var match = path.match(/\/(?:product|products|edit)\/([^\/?#]+)/i) || path.match(/[?&]id=([^\/?#]+)/i);
        if (match && match[1]) {
           return match[1];
        }

        var root = document.querySelector('.admin-view, .admin-main, .admin-panel, .admin-container, .admin-card, .admin-form, [data-admin-root]') || document;
        var hidden = root.querySelector('input[name="id"], input[name="product_id"], input[name="productId"]');
        return hidden && hidden.value ? hidden.value : null;
      }

      function uploadQueuedImages(productId) {
        if (!productId || adminProductState.pendingUploads.length === 0) {
          return Promise.resolve([]);
        }
        var queue = adminProductState.pendingUploads.slice();
        var primaryIndex = adminProductState.primaryIndex;
        var jobs = queue.map(function (item, index) {
          var formData = new FormData();
          formData.append('product_id', productId);
          formData.append('image', item.file);
          formData.append('is_primary', index === primaryIndex ? 'true' : 'false');
          return fetch(apiBase + '/upload/product-image', {
            method: 'POST',
            headers: uploadHeaders(),
            body: formData
          }).then(function (response) {
            if (!response.ok) {
              return response.json().catch(function () { return {}; }).then(function (data) {
                throw new Error(data.message || 'Görsel yükleme başarısız.');
              });
            }
            return response.json();
          });
        });
        return Promise.all(jobs).then(function (result) {
          var uploadedItems = [];
          result.forEach(function (entry) {
            var rows = entry && Array.isArray(entry.uploaded) ? entry.uploaded : [];
            rows.forEach(function (row) {
              if (row && typeof row === 'object') {
                uploadedItems.push(row);
              }
            });
          });
          var primaryImage = uploadedItems[primaryIndex] || uploadedItems[0] || null;
          var primaryUrl = primaryImage && primaryImage.urls
            ? (primaryImage.urls.medium || primaryImage.urls.original || primaryImage.url || '')
            : (primaryImage && primaryImage.url ? primaryImage.url : '');

          adminProductState.pendingUploads.forEach(function (item) {
            try { URL.revokeObjectURL(item.url); } catch (e) { }
          });
          adminProductState.pendingUploads = [];
          adminProductState.primaryIndex = 0;
          adminProductState.currentProductId = productId;
          var manager = document.querySelector('[data-admin-gallery-manager]');
          if (manager) {
            var existingList = manager.querySelector('[data-role="existing-gallery"]');
            if (existingList) {
              loadExistingProductImages(productId).then(function () {
                renderExistingGallery(manager, existingList);
              });
            }
            var pendingList = manager.querySelector('[data-role="pending-gallery"]');
            if (pendingList) {
              renderGalleryQueue(manager, pendingList);
            }
          }
          if (!primaryUrl) {
            return result;
          }
          return fetch(apiBase + '/products/' + encodeURIComponent(productId), {
            method: 'PATCH',
            headers: Object.assign({ 'Content-Type': 'application/json' }, uploadHeaders()),
            body: JSON.stringify({
              img: primaryUrl,
              images: uploadedItems.map(function (item) {
                return item && item.urls ? (item.urls.original || item.url || '') : (item && item.url ? item.url : '');
              }).filter(Boolean)
            })
          }).then(function () {
            return result;
          }).catch(function () {
            return result;
          });
        });
      }

      function interceptProductRequests() {
        if (window.__adminProductInterceptBound) {
          return;
        }
        window.__adminProductInterceptBound = true;
        var nativeFetch = window.fetch;
        window.fetch = function (input, init) {
          var requestUrl = typeof input === 'string' ? input : (input && input.url ? input.url : '');
          var method = String((init && init.method) || (input && input.method) || 'GET').toUpperCase();
          var isProductWrite = /\/api\/products(\/[^/]+)?$/i.test(requestUrl) && (method === 'POST' || method === 'PUT' || method === 'PATCH');

          return nativeFetch.apply(this, arguments).then(function (response) {
            if (!isProductWrite || !response.ok || adminProductState.pendingUploads.length === 0) {
              return response;
            }

            var clone = response.clone();
            return clone.json().then(function (data) {
              var productId = findProductIdFromResponse(data) || resolveCurrentAdminProductId();
              if (!productId) {
                return response;
              }
              return uploadQueuedImages(productId).then(function () {
                if (method === 'POST' && document.querySelector('.admin-table')) {
                  window.setTimeout(function () {
                    window.location.reload();
                  }, 350);
                }
                return response;
              }).catch(function (error) {
                window.alert('Ürün kaydedildi fakat görseller yüklenemedi: ' + error.message);
                return response;
              });
            }).catch(function () {
              return response;
            });
          });
        };
      }

      function normalizeText(value) {
        return normalize(value)
          .replace(/ı/g, 'i')
          .replace(/ğ/g, 'g')
          .replace(/ü/g, 'u')
          .replace(/ş/g, 's')
          .replace(/ö/g, 'o')
          .replace(/ç/g, 'c');
      }

      function ensureAdminProductTableBadges() {
        var tables = document.querySelectorAll('.admin-table');
        if (!tables.length) {
          return;
        }

        fetch(apiBase + '/products?include_inactive=1', { headers: uploadHeaders() })
          .then(function (response) { return response.ok ? response.json() : []; })
          .then(function (products) {
            var byName = {};
            (Array.isArray(products) ? products : []).forEach(function (product) {
              byName[normalizeText(product.title || product.name)] = product;
            });

            Array.prototype.forEach.call(tables, function (table) {
              var rows = table.querySelectorAll('tbody tr');
              Array.prototype.forEach.call(rows, function (row) {
                if (row.dataset.stockEnhanced === '1') {
                  return;
                }
                var firstCell = row.querySelector('td');
                if (!firstCell) {
                  return;
                }
                var key = normalizeText(firstCell.textContent);
                var product = byName[key];
                if (!product) {
                  return;
                }
                row.dataset.stockEnhanced = '1';
                var stock = Number(product.stock || 0);
                var stockClass = stock <= 0 ? 'out-stock' : (stock <= 3 ? 'low-stock' : 'in-stock');
                var stockLabel = stock <= 0 ? 'Stok Yok' : (stock <= 3 ? ('Düşük Stok: ' + stock) : ('Stok: ' + stock));
                var badges = document.createElement('div');
                badges.style.display = 'flex';
                badges.style.flexWrap = 'wrap';
                badges.style.gap = '8px';
                badges.style.marginTop = '8px';
                badges.innerHTML =
                  '<span class="admin-stock-badge ' + stockClass + '">' + stockLabel + '</span>' +
                  '<span class="admin-condition-badge ' + (product.productCondition === 'used' ? 'used' : '') + '">' + (product.productConditionLabel || 'Sıfır') + '</span>';
                firstCell.appendChild(badges);
              });
            });
          }).catch(function () { });
      }

      function updateSummary(form, priceInput, desiInput) {
        ensureShippingGroups().then(function (groups) {
          if (!form.isConnected) {
            return;
          }
          var host = desiInput.closest('.admin-form-group, .form-group, .col') || desiInput.parentElement || form;
          var summary = ensureSummaryBox(host);
          var basePrice = parseNumber(priceInput.value);
          var desi = parseNumber(desiInput.value);
          var group = matchGroupByDesi(groups, desi);
          var desiFee = group ? parseNumber(group.price != null ? group.price : group.base_fee) : 0;
          var total = basePrice + desiFee;
          summary.querySelector('[data-role="base-price"]').textContent = formatCurrency(basePrice);
          summary.querySelector('[data-role="desi-fee"]').textContent = formatCurrency(desiFee);
          summary.querySelector('[data-role="total-price"]').textContent = formatCurrency(total);
          summary.querySelector('[data-role="group-name"]').textContent = group
            ? ('Aktif aralik: ' + (group.name || ('DHL Express ' + group.min_desi + '-' + (group.max_desi == null ? '+' : group.max_desi) + ' desi')))
            : 'Desi girildiginde uygun DHL Express araligi burada gosterilir.';
        });
      }

      function bindAdminDesiSummary() {
        var forms = document.querySelectorAll('form');
        Array.prototype.forEach.call(forms, function (form) {
          if (form.dataset.adminProductEnhancementsBound !== '1') {
            form.dataset.adminProductEnhancementsBound = '1';
            ensureConditionSelect(form);
            ensureGalleryManager(form);
          }
          if (form.dataset.desiSummaryBound === '1') {
            return;
          }
          var priceGroup = findInputGroup(form, ['fiyat']) || findInputGroup(form, ['price']);
          var desiGroup = findInputGroup(form, ['desi']);
          if (!priceGroup || !desiGroup) {
            return;
          }
          var priceInput = resolveInput(priceGroup);
          var desiInput = resolveInput(desiGroup);
          if (!priceInput || !desiInput) {
            return;
          }
          form.dataset.desiSummaryBound = '1';
          var render = function () { updateSummary(form, priceInput, desiInput); };
          priceInput.addEventListener('input', render);
          desiInput.addEventListener('input', render);
          priceInput.addEventListener('change', render);
          desiInput.addEventListener('change', render);
          render();
        });
      }

      function bindAdminGalleryEnhancements() {
        var forms = document.querySelectorAll('form');
        Array.prototype.forEach.call(forms, function (form) {
          if (form.dataset.adminProductEnhancementsBound !== '1') {
            form.dataset.adminProductEnhancementsBound = '1';
            ensureConditionSelect(form);
            ensureGalleryManager(form);
          }
        });
      }

      function forceAdminGalleryBootstrap() {
        var attempts = 0;
        var timer = setInterval(function () {
          attempts += 1;
          bindAdminGalleryEnhancements();
          if (document.querySelector('[data-admin-gallery-manager]') || attempts >= 40) {
            clearInterval(timer);
          }
        }, 250);
      }

          }

        if (!categoryView || categoryView.querySelector('[data-admin-category-banner-manager]')) {

        }

        Promise.all([loadCategories(), loadCategoryBannerManifest()]).then(function (result) {

          var manifest = result[1] || {};
          if (!rows.length) {
            return;
          }

          var manager = document.createElement('div');
          manager.className = 'admin-banner-manager';
          manager.setAttribute('data-admin-category-banner-manager', '1');

        if (!product) {
          applyDefaultSeo();

        var title = (product.title || product.name || 'Urun') + ' | BoomerItems';
        var description = (product.description || defaultSeo.description).replace(/\s+/g, ' ').trim().slice(0, 155);
        var urlKey = encodeURIComponent(product.slug || product.id || '');
        var canonicalUrl = 'https://boomeritems.com/#urun/' + urlKey;

        setSeoMeta('meta[property="og:url"]', canonicalUrl);

        setSeoMeta('link[rel="canonical"]', canonicalUrl, 'href');
        setJsonLd('#product-jsonld', {
          '@context': 'https://schema.org',
          '@type': 'Product',
          name: product.title || product.name || 'BoomerItems Urun',

          history.replaceState(null, '', window.location.pathname + window.location.search);
        }

        if (!product) {
          return null;

        return document.querySelector('.products-grid .product-card[data-product-id="' + String(product.id || '') + '"], .products-grid .product-card[data-product-slug="' + String(product.slug || '') + '"]');
