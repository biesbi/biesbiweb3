<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Final Upload Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Consolas', 'Monaco', monospace; background: #0f172a; color: #e2e8f0; padding: 2rem; font-size: 13px; }
  .container { max-width: 1200px; margin: 0 auto; background: #1e293b; padding: 2rem; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  h1 { color: #38bdf8; margin-bottom: 1rem; font-size: 1.8rem; }
  .section { background: #0f172a; padding: 1.5rem; border-radius: 8px; margin: 1rem 0; border-left: 4px solid #38bdf8; }
  label { display: block; margin: 0.75rem 0 0.25rem 0; color: #94a3b8; font-weight: 600; }
  input, select { width: 100%; padding: 0.75rem; background: #334155; border: 1px solid #475569; border-radius: 6px; color: #e2e8f0; font-family: inherit; font-size: 13px; }
  button { background: #38bdf8; color: #0f172a; border: none; padding: 0.875rem 1.75rem; border-radius: 8px; cursor: pointer; font-weight: 700; margin: 0.5rem 0.5rem 0.5rem 0; font-size: 14px; }
  button:hover { background: #0ea5e9; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  #output { margin-top: 2rem; }
  .log { padding: 0.75rem 1rem; margin: 0.5rem 0; border-radius: 6px; border-left: 4px solid; font-size: 12px; line-height: 1.6; }
  .log.info { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
  .log.success { background: #064e3b; border-color: #10b981; color: #6ee7b7; }
  .log.warning { background: #78350f; border-color: #f59e0b; color: #fcd34d; }
  .log.error { background: #7f1d1d; border-color: #ef4444; color: #fca5a5; }
  pre { background: #000; color: #0f0; padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 11px; margin: 0.5rem 0; }
  .divider { border: 0; height: 2px; background: linear-gradient(90deg, #38bdf8, transparent); margin: 1.5rem 0; }
  code { background: #334155; padding: 0.2rem 0.5rem; border-radius: 4px; color: #38bdf8; font-size: 11px; }
</style>
</head>
<body>
<div class="container">
  <h1>🧪 Final Upload Test - Detaylı Hata Analizi</h1>

  <div class="section">
    <label>1️⃣ Admin Token:</label>
    <input type="text" id="token" placeholder="Bearer token (otomatik alınacak)">
    <button onclick="doLogin()">🔐 Login Yap</button>
  </div>

  <div class="section">
    <label>2️⃣ Ürün Seç:</label>
    <select id="productSelect" onchange="updateProductId()">
      <option value="">Önce ürünleri yükleyin...</option>
    </select>
    <button onclick="loadProducts()">📦 Ürünleri Yükle</button>
    <br><br>
    <label>Seçilen Ürün ID:</label>
    <input type="text" id="productId" readonly>
  </div>

  <div class="section">
    <label>3️⃣ Fotoğraf:</label>
    <input type="file" id="imageFile" accept="image/*">
  </div>

  <div class="section">
    <button onclick="uploadPhoto()" style="background: #dc2626; color: white; font-size: 16px; padding: 1rem 2rem;">
      🚀 FOTOĞRAF YÜKLE VE TEST ET
    </button>
    <button onclick="clearLogs()" style="background: #475569;">🗑️ Logları Temizle</button>
  </div>

  <hr class="divider">

  <div id="output"></div>
</div>

<script>
const apiBase = '/api';
let authToken = '';
let products = [];

function log(message, type = 'info') {
  const output = document.getElementById('output');
  const div = document.createElement('div');
  div.className = 'log ' + type;
  div.innerHTML = escapeHtml(message).replace(/\n/g, '<br>');
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}

function clearLogs() {
  document.getElementById('output').innerHTML = '';
}

async function doLogin() {
  log('🔐 Login işlemi başlatılıyor...', 'info');

  try {
    const response = await fetch(apiBase + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: 'admin@boomeritems.com',
        password: 'admin123'
      })
    });

    const data = await response.json();

    if (response.ok && data.token) {
      authToken = data.token;
      document.getElementById('token').value = authToken;
      log('✅ Login başarılı!', 'success');
      log('Token: ' + authToken.substring(0, 50) + '...', 'info');
    } else {
      log('❌ Login başarısız!', 'error');
      log('Response: ' + JSON.stringify(data, null, 2), 'warning');
    }
  } catch (error) {
    log('❌ Login hatası: ' + error.message, 'error');
  }
}

async function loadProducts() {
  const token = document.getElementById('token').value || authToken;

  if (!token) {
    log('⚠️ Önce login yapmalısınız!', 'warning');
    return;
  }

  log('📦 Ürünler yükleniyor...', 'info');

  try {
    const response = await fetch(apiBase + '/products?limit=20', {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    const data = await response.json();

    if (response.ok && Array.isArray(data) && data.length > 0) {
      products = data;
      const select = document.getElementById('productSelect');
      select.innerHTML = '<option value="">-- Ürün Seçin --</option>';

      data.forEach(p => {
        const option = document.createElement('option');
        option.value = p.id;
        option.textContent = p.name + ' (ID: ' + p.id + ')';
        select.appendChild(option);
      });

      log('✅ ' + data.length + ' ürün yüklendi!', 'success');
    } else {
      log('❌ Ürün yüklenemedi!', 'error');
      log('Response: ' + JSON.stringify(data, null, 2), 'warning');
    }
  } catch (error) {
    log('❌ Ürün yükleme hatası: ' + error.message, 'error');
  }
}

function updateProductId() {
  const select = document.getElementById('productSelect');
  document.getElementById('productId').value = select.value;
}

async function uploadPhoto() {
  const token = document.getElementById('token').value || authToken;
  const productId = document.getElementById('productId').value;
  const fileInput = document.getElementById('imageFile');

  // Validasyonlar
  if (!token) {
    log('❌ Token bulunamadı! Önce login yapın.', 'error');
    return;
  }

  if (!productId) {
    log('❌ Ürün ID seçilmedi! Ürün seçin.', 'error');
    return;
  }

  if (!fileInput.files[0]) {
    log('❌ Fotoğraf seçilmedi!', 'error');
    return;
  }

  const file = fileInput.files[0];

  // Upload başlat
  log('═══════════════════════════════════════════════════════', 'info');
  log('🚀 FOTOĞRAF YÜKLEME BAŞLADI', 'info');
  log('═══════════════════════════════════════════════════════', 'info');
  log('Ürün ID: ' + productId, 'info');
  log('Dosya Adı: ' + file.name, 'info');
  log('Dosya Boyutu: ' + (file.size / 1024).toFixed(2) + ' KB', 'info');
  log('Dosya Tipi: ' + file.type, 'info');
  log('───────────────────────────────────────────────────────', 'info');

  const formData = new FormData();
  formData.append('product_id', productId);
  formData.append('image', file);
  formData.append('is_primary', 'true');

  try {
    log('📤 İstek gönderiliyor: POST /api/upload/product-image', 'info');

    const response = await fetch(apiBase + '/upload/product-image', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token
      },
      body: formData
    });

    log('───────────────────────────────────────────────────────', 'info');
    log('📥 RESPONSE GELDİ', 'info');
    log('───────────────────────────────────────────────────────', 'info');
    log('HTTP Status: ' + response.status + ' ' + response.statusText, response.ok ? 'success' : 'error');

    const responseText = await response.text();

    let data;
    try {
      data = JSON.parse(responseText);
      log('Response (JSON):', response.ok ? 'success' : 'error');
      log(JSON.stringify(data, null, 2), response.ok ? 'success' : 'error');
    } catch (e) {
      log('❌ Response JSON formatında değil!', 'error');
      log('Raw Response:', 'warning');
      log(responseText, 'warning');
      return;
    }

    if (response.ok) {
      log('═══════════════════════════════════════════════════════', 'success');
      log('✅ BAŞARILI! FOTOĞRAF YÜKLENDİ!', 'success');
      log('═══════════════════════════════════════════════════════', 'success');

      if (data.uploaded && data.uploaded.length > 0) {
        const uploaded = data.uploaded[0];
        log('📸 Yüklenen Görsel:', 'success');
        log('ID: ' + uploaded.id, 'success');
        log('URL: ' + uploaded.url, 'success');
        log('Boyut: ' + uploaded.width + 'x' + uploaded.height + 'px', 'success');
      }

      // Veritabanını kontrol et
      setTimeout(() => checkDatabase(productId, token), 1000);

    } else {
      log('═══════════════════════════════════════════════════════', 'error');
      log('❌ HATA! YÜKLEME BAŞARISIZ!', 'error');
      log('═══════════════════════════════════════════════════════', 'error');

      if (data.message) {
        log('Hata Mesajı:', 'error');
        log(data.message, 'error');

        // SQL hatası mı?
        if (data.message.includes('SQLSTATE') || data.message.includes('SQL')) {
          log('───────────────────────────────────────────────────────', 'warning');
          log('🔍 SQL HATASI TESPİT EDİLDİ!', 'warning');
          log('───────────────────────────────────────────────────────', 'warning');

          // Collation hatası mı?
          if (data.message.includes('collation')) {
            log('⚠️ COLLATION HATASI!', 'warning');
            log('', 'warning');
            log('Sorun: Veritabanında karışık collation kullanımı var.', 'warning');
            log('', 'warning');
            log('ÇÖZÜM ÖNERİSİ:', 'warning');
            log('1. HeidiSQL veya phpMyAdmin açın', 'warning');
            log('2. Şu SQL komutunu çalıştırın:', 'warning');
            log('', 'warning');
            log('SET NAMES utf8mb4 COLLATE utf8mb4_turkish_ci;', 'warning');
            log('', 'warning');
            log('3. Sonra tekrar fotoğraf yüklemeyi deneyin.', 'warning');
          }
        }
      }

      if (data.errors && data.errors.length > 0) {
        log('Detaylı Hatalar:', 'error');
        data.errors.forEach(err => {
          log('- ' + err.file + ': ' + err.message, 'error');
        });
      }
    }

  } catch (error) {
    log('═══════════════════════════════════════════════════════', 'error');
    log('❌ NETWORK HATASI!', 'error');
    log('═══════════════════════════════════════════════════════', 'error');
    log('Hata: ' + error.message, 'error');
    log('Stack: ' + error.stack, 'error');
  }
}

async function checkDatabase(productId, token) {
  log('───────────────────────────────────────────────────────', 'info');
  log('🗄️ Veritabanı kontrol ediliyor...', 'info');

  try {
    const response = await fetch(apiBase + '/upload/product-image/' + productId, {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    const data = await response.json();

    if (Array.isArray(data) && data.length > 0) {
      log('✅ Veritabanında ' + data.length + ' fotoğraf bulundu!', 'success');
      data.forEach((img, i) => {
        log((i + 1) + '. ' + img.filename + ' (Primary: ' + (img.is_primary ? 'Evet' : 'Hayır') + ')', 'success');
      });
    } else {
      log('⚠️ Veritabanında fotoğraf kaydı bulunamadı!', 'warning');
    }
  } catch (error) {
    log('❌ Veritabanı kontrolü başarısız: ' + error.message, 'error');
  }
}

// Sayfa yüklendiğinde otomatik login
window.addEventListener('load', () => {
  log('🌟 Test aracı hazır! Lütfen sırayla işlemleri yapın:', 'info');
  log('1. Login Yap butonuna basın', 'info');
  log('2. Ürünleri Yükle butonuna basın', 'info');
  log('3. Bir ürün seçin', 'info');
  log('4. Fotoğraf seçin', 'info');
  log('5. FOTOĞRAF YÜKLE butonuna basın', 'info');
  log('═══════════════════════════════════════════════════════', 'info');
});
</script>
</body>
</html>
