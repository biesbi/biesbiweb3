<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödeme Sonucu - BoomerItems</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/logo_v2_cube.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    .success .icon { color: #10b981; }
    .failed .icon { color: #ef4444; }
    h1 {
      font-size: 28px;
      margin-bottom: 15px;
      color: #1f2937;
    }
    p {
      color: #6b7280;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .order-id {
      background: #f3f4f6;
      padding: 12px;
      border-radius: 8px;
      margin: 20px 0;
      font-family: monospace;
      font-size: 14px;
      color: #374151;
    }
    .buttons {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }
    .btn-secondary:hover {
      background: #e5e7eb;
    }
    .loading {
      text-align: center;
      padding: 20px;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container" id="result-container">
    <div class="loading">
      <div class="spinner"></div>
      <p>Ödeme durumu kontrol ediliyor...</p>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const status = params.get('status');
      const orderId = params.get('order_id');
      const container = document.getElementById('result-container');

      if (status === 'success') {
        container.className = 'container success';
        container.innerHTML = `
          <div class="icon">✓</div>
          <h1>Ödeme Başarılı!</h1>
          <p>Siparişiniz başarıyla alındı. Teşekkür ederiz!</p>
          ${orderId ? `<div class="order-id">Sipariş No: ${orderId}</div>` : ''}
          <p style="font-size: 14px; color: #9ca3af;">
            Sipariş detayları e-posta adresinize gönderilecektir.
          </p>
          <div class="buttons">
            <a href="/" class="btn btn-primary">Ana Sayfaya Dön</a>
            ${orderId ? `<a href="/order-track?id=${orderId}" class="btn btn-secondary">Siparişi Takip Et</a>` : ''}
          </div>
        `;
      } else if (status === 'failed') {
        container.className = 'container failed';
        container.innerHTML = `
          <div class="icon">✗</div>
          <h1>Ödeme Başarısız</h1>
          <p>Üzgünüz, ödeme işlemi tamamlanamadı.</p>
          <p style="font-size: 14px; color: #9ca3af; margin-top: 15px;">
            Lütfen kart bilgilerinizi kontrol edip tekrar deneyin.<br>
            Sorun devam ederse bankanzla iletişime geçebilirsiniz.
          </p>
          <div class="buttons">
            <a href="/" class="btn btn-primary">Ana Sayfaya Dön</a>
            <a href="/sepet" class="btn btn-secondary">Sepete Dön</a>
          </div>
        `;
      } else {
        container.innerHTML = `
          <div class="icon">⚠</div>
          <h1>Bilinmeyen Durum</h1>
          <p>Ödeme durumu belirlenemedi.</p>
          <div class="buttons">
            <a href="/" class="btn btn-primary">Ana Sayfaya Dön</a>
          </div>
        `;
      }

      // Ana sayfaya geri mesaj gönder (popup modunda açıldıysa)
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
          type: 'payment-result',
          status: status,
          orderId: orderId
        }, window.location.origin);
      }
    })();
  </script>
</body>
</html>
