      function renderCatalogGallery(modalNode, gallery) {
        var images = Array.isArray(gallery) && gallery.length ? gallery : [{ url: '/logo_v2_full.png', thumb: '/logo_v2_full.png', alt: '' }];
        activeImageIndex = Math.max(0, Math.min(activeImageIndex, images.length - 1));
        var mainImage = modalNode.querySelector('.product-detail-main-image img');
        var thumbs = modalNode.querySelector('.product-detail-thumbs');
        var current = images[activeImageIndex];
        mainImage.src = current.url || current.thumb || '/logo_v2_full.png';
        mainImage.alt = current.alt || '';
        thumbs.innerHTML = '';
        images.forEach(function (image, index) {
          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'product-detail-thumb' + (index === activeImageIndex ? ' active' : '');
          button.innerHTML = '<img alt="" src="' + (image.thumb || image.url || '/logo_v2_full.png') + '">';
          button.addEventListener('click', function () {
            activeImageIndex = index;
            renderCatalogGallery(modalNode, images);
          });
          thumbs.appendChild(button);
        });
      }

      function applyCatalogCategoryFilter(product) {
        closeCatalogModal();
        var categoryText = normalizeCatalogValue(product && product.category || '');
        var buttons = document.querySelectorAll('.filter-btn, button, a');
        var matched = Array.prototype.find.call(buttons, function (button) {
          return normalizeCatalogValue(button.textContent).indexOf(categoryText) !== -1;
        });
        if (matched) {
          matched.click();
        }
        var section = document.querySelector('.products-section');
        if (section) {
          section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }

      function fetchCatalogProductDetail(product) {
        var productKey = encodeURIComponent(String((product && (product.id || product.slug)) || ''));
        if (!productKey) {
          return Promise.resolve(product);
        }
        return fetch(apiBase + '/products/' + productKey)
          .then(function (response) {
            if (!response.ok) {
              throw new Error('Urun detayi alinamadi');
            }
            return response.json();
          })
          .then(function (payload) {
            return payload && typeof payload === 'object' ? Object.assign({}, product, payload) : product;
          })
          .catch(function () {
            return product;
          });
      }

      function setPageScrollLocked(locked) {
        var value = locked ? 'hidden' : '';
        document.body.style.overflow = value;
        document.documentElement.style.overflow = value;
      }

      function openCatalogDetail(product) {
        if (!product) {
          return;
        }
        if ((!Array.isArray(product.gallery) || !product.gallery.length) && !product.__detailLoaded) {
          fetchCatalogProductDetail(product).then(function (fullProduct) {
            fullProduct.__detailLoaded = true;
            openCatalogDetail(fullProduct);
          });
          return;
        }
        var modalNode = ensureCatalogModal();
        activeProduct = product;
        activeImageIndex = 0;

        modalNode.querySelector('.product-detail-title').textContent = product.title || product.name || '';
        modalNode.querySelector('.product-detail-description').textContent = product.description || 'Bu urun icin henuz aciklama girilmedi.';
        modalNode.querySelector('.product-detail-price strong').textContent = formatCatalogMoney(product.price || 0);

        var oldPriceNode = modalNode.querySelector('.product-detail-price s');
        if (Number(product.oldPrice || 0) > Number(product.price || 0)) {
          oldPriceNode.textContent = formatCatalogMoney(product.oldPrice);
          oldPriceNode.style.display = '';
        } else {
          oldPriceNode.style.display = 'none';
        }

        var kicker = modalNode.querySelector('.product-detail-kicker');
        kicker.innerHTML = '';
        if (product.category) {
          var categoryButton = document.createElement('button');
          categoryButton.type = 'button';
          categoryButton.className = 'product-detail-chip';
          categoryButton.textContent = product.category;
          categoryButton.addEventListener('click', function () {
            applyCatalogCategoryFilter(product);
          });
          kicker.appendChild(categoryButton);
        }

        var conditionChip = document.createElement('span');
        conditionChip.type = 'button';
        conditionChip.className = 'product-detail-chip ' + (product.productCondition === 'used' ? 'condition-used' : 'condition-new');
        conditionChip.textContent = product.productConditionLabel || (product.productCondition === 'used' ? 'Ikinci El' : 'Sifir');
        kicker.appendChild(conditionChip);

        var stockChip = document.createElement('span');
        stockChip.className = 'product-detail-chip' + ((product.isActive === false || Number(product.stock || 0) <= 0) ? ' stock-out' : '');
        stockChip.textContent = getCatalogStockLabel(product);
        kicker.appendChild(stockChip);

        modalNode.querySelector('[data-role="category"] strong').textContent = product.category || '-';
        modalNode.querySelector('[data-role="stock"] strong').textContent = getCatalogStockLabel(product);

  <script>
    (function () {
      var apiBase = window.location.origin + '/api';

      function normalize(value) {
        return String(value || '')
          .toLocaleLowerCase('tr-TR')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function fetchProducts() {
        if (productsPromise) {
          return productsPromise;
        }
        productsPromise = window.__boomerPerf.fetchJsonOnce('products-summary', apiBase + '/products?summary=1')
          .then(function (rows) {
            products = Array.isArray(rows) ? rows : [];

            products = [];
            return products;
          });
        return productsPromise;
      }

      function getFilterButtons() {
        return Array.prototype.slice.call(document.querySelectorAll('.filter-btn'));
      }

      function getCards() {
        return Array.prototype.slice.call(document.querySelectorAll('.products-grid .product-card'));
      }

      function resolveProductByCard(card) {
        var titleNode = card.querySelector('.product-title, h1, h2, h3, h4');
        var title = normalize(titleNode ? titleNode.textContent : '');
        return products.find(function (product) {
          return normalize(product.title || product.name) === title;
        }) || null;
      }

      function setButtonVisibility(button, visible) {
        button.style.display = visible ? '' : 'none';
      }

      function activeFilterText() {
        var active = document.querySelector('.filter-btn.active');
        return normalize(active ? active.textContent : '');
      }

      function matchesFilter(product, filterText) {
        if (!filterText || filterText === 'tumu' || filterText === 'tümu' || filterText === 'tümü') {
          return true;
        }
        var haystack = [
          product.category,
          product.categorySlug,
          product.brand,
          product.brandSlug,
          product.title,
          product.name
        ].map(normalize).join(' ');
        return haystack.indexOf(filterText) !== -1;
      }

      function updateVisibleFilterButtons(filteredProducts) {
        var available = {};
        filteredProducts.forEach(function (product) {
          [product.category, product.categorySlug, product.brand, product.brandSlug].forEach(function (value) {
            var key = normalize(value);
            if (key) {
              available[key] = true;
            }
          });
        });

        getFilterButtons().forEach(function (button) {
          var text = normalize(button.textContent);
          if (text === 'tumu' || text === 'tümu' || text === 'tümü') {
            setButtonVisibility(button, true);
            return;
          }
          var visible = Object.keys(available).some(function (key) {
            return key.indexOf(text) !== -1 || text.indexOf(key) !== -1;
          });
          setButtonVisibility(button, visible);
        });
      }

      function applyFilterContext() {
        if (!products.length) {
          return;
        }
        var filterText = activeFilterText();
        var cards = getCards();
        var filteredProducts = [];

        cards.forEach(function (card) {
          var product = resolveProductByCard(card);
          if (!product) {
            return;
          }
          if (matchesFilter(product, filterText)) {
            filteredProducts.push(product);
          }

        updateVisibleFilterButtons(filteredProducts.length ? filteredProducts : products);

          return;

      // Extreme Address Fixer & Console Error Silencer
      (function() {
        const lockFields = ['street', 'neighborhood', 'checkout-street', 'checkout-neighborhood'];
        
        // Property Lock on Prototype
        const originalDisabled = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'disabled');
        Object.defineProperty(HTMLInputElement.prototype, 'disabled', {
          get() { return originalDisabled.get.call(this); },
          set(v) {
            if (v && (lockFields.includes(this.name) || lockFields.includes(this.id))) {
              return; // Block disabling
            }
            originalDisabled.set.call(this, v);
          }

        // Periodic Sweep to ensure no other attributes block input

          lockFields.forEach(idOrName => {
            const el = document.querySelector(`[name="${idOrName}"]`) || document.querySelector(`#${idOrName}`);
            if (el) {
              if (el.disabled) el.disabled = false;
              if (el.readOnly) el.readOnly = false;
              el.style.pointerEvents = 'auto';
              el.style.opacity = '1';
              el.style.backgroundColor = '#fff';
            }

          document.querySelectorAll('[required]').forEach(el => {
            const style = window.getComputedStyle(el);

            var info = document.createElement('div');
            info.style.cssText = 'margin-top:8px;font-size:12px;color:#64748b;';
            info.innerHTML = '💡 <strong>Çoklu seçim yapabilirsiniz!</strong> İlk görsel kapak olacak.';
            parent.insertBefore(info, preview);
          }

          input.addEventListener('change', function(e) {
            var files = Array.from(e.target.files);
            console.log('📸 ' + files.length + ' görsel seçildi');
            preview.innerHTML = '';

            if (files.length === 0) {
              preview.innerHTML = '<div style="padding:20px;text-align:center;color:#94a3b8;">Görsel seçilmedi</div>';
              return;
            }

            if (window.adminProductState) {
              window.adminProductState.pendingUploads = files.map(function(file) {
                return { file: file, url: URL.createObjectURL(file) };
              });
              window.adminProductState.primaryIndex = 0;
            }

            files.forEach(function(file, index) {
              var container = document.createElement('div');
              container.style.cssText = 'position:relative;border:2px solid ' + (index === 0 ? '#fbbf24' : '#e2e8f0') + ';border-radius:8px;overflow:hidden;aspect-ratio:1;box-shadow:' + (index === 0 ? '0 0 10px rgba(251,191,36,0.5)' : 'none');
              var img = document.createElement('img');
              img.src = URL.createObjectURL(file);
              img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
              var label = document.createElement('div');
              label.textContent = index === 0 ? '⭐ Kapak' : (index + 1);
              label.style.cssText = 'position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);color:white;padding:4px;text-align:center;font-size:10px;font-weight:bold;';
              container.appendChild(img);
              container.appendChild(label);
              preview.appendChild(container);
            });
          });
        });
      }

      // Hemen çalıştır
      enhanceImageInput();
      setTimeout(enhanceImageInput, 100);
      setTimeout(enhanceImageInput, 500);
      setTimeout(enhanceImageInput, 1000);

      // MutationObserver
      var observer = new MutationObserver(enhanceImageInput);
      observer.observe(document.body, { childList: true, subtree: true });

      // Çok sık kontrol et
      setInterval(enhanceImageInput, 500);
    })();
  </script>
</body>

</html>
