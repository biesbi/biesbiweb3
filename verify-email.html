<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-posta Doğrulama</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f1f5f9; font-family: Arial, sans-serif; color: #0f172a; }
    .card { width: min(92vw, 560px); background: #fff; border-radius: 20px; box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12); overflow: hidden; }
    .head { background: #0f172a; padding: 28px; text-align: center; }
    .head img { max-width: 240px; width: 100%; height: auto; }
    .body { padding: 32px; text-align: center; }
    h1 { margin: 0 0 12px; }
    p { margin: 0; line-height: 1.6; color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <img src="/logo_full.png" alt="BoomerItems">
    </div>
    <div class="body">
      <h1 id="title">E-posta doğrulanıyor</h1>
      <p id="message">Lütfen bekleyin.</p>
    </div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token') || '';
      var title = document.getElementById('title');
      var message = document.getElementById('message');

      if (!token) {
        title.textContent = 'Geçersiz bağlantı';
        message.textContent = 'Doğrulama bağlantısı eksik veya bozuk.';
        return;
      }

      fetch('/api/auth/verify-email/' + encodeURIComponent(token))
        .then(function (response) {
          return response.json().then(function (data) {
            if (!response.ok) {
              throw new Error(data.message || 'Doğrulama başarısız.');
            }
            return data;
          });
        })
        .then(function (data) {
          title.textContent = 'E-posta doğrulandı';
          message.textContent = data.message || 'Artık hesabınıza giriş yapabilirsiniz.';
        })
        .catch(function (error) {
          title.textContent = 'Doğrulama başarısız';
          message.textContent = error.message || 'Bağlantı süresi dolmuş olabilir.';
        });
    })();
  </script>
</body>
</html>
